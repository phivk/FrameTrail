<!DOCTYPE html>
<!--
  EXAMPLE: Inline YouTube video — no server, no _data folder
  ───────────────────────────────────────────────────────────
  Requirements: None. Works in any modern browser, including Firefox and Safari,
  opened from the filesystem (file://) or served from any static web server.

  Demonstrates:
  - All data (config, resources, hypervideo) passed inline via init options
  - No _data folder, no PHP server needed
  - storageMode is 'download': edits are stored in memory and can be exported
    via Save As — nothing persists past a page reload unless you export the JSON

  For the clip src, use the YouTube embed URL (https://www.youtube.com/embed/ID).
  This lets FrameTrail detect videoType='youtube' and build the correct iframe.
  The same URL goes in the resource data so YouTube resources can be used as overlays.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Inline YouTube</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        window.ftInstance = FrameTrail.init({
            target:  'body',
            startID: '0',        // open the first (and only) hypervideo directly

            // Minimal config — no server needed
            config: {
                theme:            '',
                alwaysForceLogin: false,
                allowCaching:     false
            },

            // Resource pool — used when attaching YouTube videos as overlays/annotations.
            // src must be the YouTube embed URL so FrameTrail can render it correctly.
            resources: [{
                label: 'Inline resources',
                type:  'frametrail',
                data: {
                    'yt-bbb': {
                        name:        'Big Buck Bunny (YouTube)',
                        type:        'youtube',
                        src:         'https://www.youtube.com/embed/YE7VzlLtp-4',
                        thumb:       '',
                        licenseType: 'cc-by',
                        attributes:  {},
                        tags:        []
                    }
                }
            }],

            // The hypervideo, defined inline
            contents: [{
                hypervideo: {
                    meta: {
                        name:        'Big Buck Bunny',
                        description: 'Open-source animated short film — inline FrameTrail demo',
                        thumb:       '',
                        creator:     'Demo',
                        creatorId:   'demo',
                        created:     1700000000000,
                        lastchanged: 1700000000000
                    },
                    config: {
                        layoutArea:  { areaTop: [], areaBottom: [], areaLeft: [], areaRight: [] },
                        hidden:      false,
                        slidingMode: 'overlay',
                        theme:       ''
                    },
                    clips: [{
                        // Use src (not resourceId) so FrameTrail detects videoType='youtube'.
                        // Any YouTube URL format works: embed, watch, or youtu.be short link.
                        src:      'https://www.youtube.com/embed/YE7VzlLtp-4',
                        duration: 596,   // 9:56 — update this to match your video
                        start:    0,
                        end:      596
                    }],
                    contents:     [],    // overlays (W3C annotation format)
                    subtitles:    {},
                    globalEvents: { onReady: '', onPlay: '', onPause: '', onEnded: '' },
                    customCSS:    ''
                },
                annotations: []
            }]
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
