<!DOCTYPE html>
<!--
  EXAMPLE: Static hosting / CDN mode (no PHP backend)
  ───────────────────────────────────────────────────
  Requirements: HTTP serving from the repo root (fetch API cannot load from file://).
  Serve the repo root, e.g.: python3 -m http.server 8080

  Demonstrates:
  - Loading all hypervideo data from a static dataPath URL (no PHP server)
  - storageMode becomes 'static': read-only from the data source,
    in-memory edits, Save As export
  - No user management or file uploads (no server= option)

  This example points dataPath at the built-in slavin example data directory.
  In production, you would point dataPath at a CDN or static host with CORS enabled.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Static CDN</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; }
    </style>
</head>
<body>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        window.ftInstance = FrameTrail.init({
            // Base URL of the _data/ directory.
            // Here we use the built-in slavin example data from the repo.
            // In production, point this at a CDN or static host with CORS headers.
            dataPath: '../src/_data-examples/slavin/_data/',

            // No `server` option. StorageManager detects the combination of an
            // explicit dataPath + no server and sets storageMode to 'static'.
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
