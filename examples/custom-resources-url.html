<!DOCTYPE html>
<!--
  EXAMPLE: Resources from custom URLs — merging multiple sources
  ──────────────────────────────────────────────────────────────
  Requirements: HTTP serving (fetches JSON via fetch API — cannot load from file://).
  Serve the repo root, e.g.: python3 -m http.server 8080

  Demonstrates:
  - Loading resources from multiple sources and merging them
  - One source is inline data, the other is a JSON file loaded by URL
  - Resources from all sources are merged — entries from earlier sources
    take precedence on ID collision

  Expected resource index format at the URL:
  {
    "resources": {
      "resource-id": { "name": "...", "type": "youtube", "src": "...", ... }
    }
  }
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Custom Resource URL</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; }
        body > div { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {

        var VIDEO_URL = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4';

        window.ftInstance = FrameTrail.init({
            target:  '#player',
            startID: '0',

            resources: [
                // Source 1: Inline resource data (always available, no fetch needed)
                {
                    label: 'Inline Resources',
                    type:  'frametrail',
                    data: {
                        'img-bunny-poster': {
                            name:        'Big Buck Bunny Poster',
                            type:        'image',
                            src:         'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/220px-Big_buck_bunny_poster_big.jpg',
                            thumb:       '',
                            licenseType: 'cc-by',
                            attributes:  {},
                            tags:        []
                        }
                    }
                },
                // Source 2: Loaded from a JSON file by URL (fetched at init time).
                // Both sets are merged — entries from earlier sources take precedence on ID collision.
                {
                    label: 'Shared Library (from JSON)',
                    data:  'sample-resources.json',
                    type:  'frametrail'
                }
            ],

            contents: [{
                hypervideo: {
                    meta: {
                        name:        'Big Buck Bunny',
                        description: 'Demonstrates merging resources from inline data and a JSON URL',
                        thumb:       '',
                        creator:     'Demo',
                        creatorId:   'demo',
                        created:     1700000000000,
                        lastchanged: 1700000000000
                    },
                    config: {
                        layoutArea:  { areaTop: [], areaBottom: [], areaLeft: [], areaRight: [] },
                        hidden:      false,
                        slidingMode: 'overlay'
                    },
                    clips: [{
                        src:      VIDEO_URL,
                        duration: 596,
                        start:    0,
                        end:      596
                    }],
                    contents:     [],
                    subtitles:    {},
                    globalEvents: { onReady: '', onPlay: '', onPause: '', onEnded: '' },
                    customCSS:    ''
                },
                annotations: []
            }]
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
