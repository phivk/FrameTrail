<!DOCTYPE html>
<!--
  EXAMPLE: Resources from a custom URL (server mode)
  ──────────────────────────────────────────────────
  Requirements: Apache + PHP (FrameTrail installed and set up at the parent directory).

  Demonstrates:
  - Loading the resource index from a custom URL instead of _data/resources/_index.json
  - Merging resources from multiple sources (e.g., a local pool + a shared library)
  - Resources from any URL that returns a valid FrameTrail resource index JSON are merged

  Expected resource index format at the URL:
  {
    "resources": {
      "resource-id": { "name": "...", "type": "youtube", "src": "...", ... }
    }
  }

  Replace the shared library URL and 'your-hypervideo-id' with real values.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Custom Resource URL</title>
    <link rel="shortcut icon" href="../favico.png">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; }
        body > div { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        window.ftInstance = FrameTrail.init({
            target:  '#player',
            startID: 'your-hypervideo-id',

            resources: [
                // Load the local resource pool from the server
                {
                    label: 'Local Resources',
                    data:  '../_data/resources/_index.json',
                    type:  'frametrail'
                },
                // Merge in a shared resource library from another server or CDN.
                // Both sets are merged — entries from earlier sources take precedence on ID collision.
                {
                    label: 'Shared Library',
                    data:  'https://your-shared-server.example.com/resources/_index.json',
                    type:  'frametrail'
                }
            ],

            dataPath: '../_data/',
            server:   '../_server/'
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
