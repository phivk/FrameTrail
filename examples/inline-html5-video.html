<!DOCTYPE html>
<!--
  EXAMPLE: Inline HTML5 video — no server, no _data folder
  ──────────────────────────────────────────────────────────
  Requirements: None. Works in any modern browser, opened from the filesystem
  (file://) or served from any static web server.

  Demonstrates:
  - All data (config, resources, hypervideo) passed inline via init options
  - No _data folder, no PHP server needed
  - storageMode is 'download': edits are stored in memory, export via Save As

  The clip uses `src` directly with the video URL. Any publicly accessible
  .mp4 / .webm / .m3u8 URL works. Replace VIDEO_URL and VIDEO_DURATION_SECONDS.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Inline HTML5 Video</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <script>
    document.addEventListener('DOMContentLoaded', function() {

        var VIDEO_URL              = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4';
        var VIDEO_DURATION_SECONDS = 596;

        window.ftInstance = FrameTrail.init({
            target:  'body',
            startID: '0',

            contents: [{
                hypervideo: {
                    meta: {
                        name:        'Big Buck Bunny',
                        description: 'Open-source animated short — streamed from HTTPS URL',
                        thumb:       '',
                        creator:     'Demo',
                        creatorId:   'demo',
                        created:     1700000000000,
                        lastchanged: 1700000000000
                    },
                    config: {
                        layoutArea:  { areaTop: [], areaBottom: [], areaLeft: [], areaRight: [] },
                        hidden:      false,
                        slidingMode: 'overlay'
                    },
                    clips: [{
                        src:      VIDEO_URL,
                        duration: VIDEO_DURATION_SECONDS,
                        start:    0,
                        end:      VIDEO_DURATION_SECONDS
                    }],
                    contents:     [],
                    subtitles:    {},
                    globalEvents: { onReady: '', onPlay: '', onPause: '', onEnded: '' },
                    customCSS:    ''
                },
                annotations: [
                    {
                        '@context': [ 'http://www.w3.org/ns/anno.jsonld', { 'frametrail': 'http://frametrail.org/ns/' } ],
                        'type': 'Annotation', 'frametrail:type': 'Annotation',
                        'creator': { 'nickname': 'Demo', 'type': 'Person', 'id': 'demo' },
                        'created': '2024-01-01T00:00:00Z',
                        'target': { 'type': 'Video', 'source': VIDEO_URL, 'selector': { 'type': 'FragmentSelector', 'conformsTo': 'http://www.w3.org/TR/media-frags/', 'value': 't=10,25' } },
                        'body': { 'type': 'TextualBody', 'frametrail:type': 'text', 'format': 'text/html', 'value': '<p>The opening scene establishes the pastoral landscape and introduces Big Buck Bunny.</p>', 'frametrail:name': 'Opening scene', 'frametrail:thumb': null, 'frametrail:resourceId': null, 'frametrail:attributes': { 'text': '<p>The opening scene establishes the pastoral landscape and introduces Big Buck Bunny.</p>' } },
                        'frametrail:tags': []
                    },
                    {
                        '@context': [ 'http://www.w3.org/ns/anno.jsonld', { 'frametrail': 'http://frametrail.org/ns/' } ],
                        'type': 'Annotation', 'frametrail:type': 'Annotation',
                        'creator': { 'nickname': 'Demo', 'type': 'Person', 'id': 'demo' },
                        'created': '2024-01-01T00:01:00Z',
                        'target': { 'type': 'Video', 'source': VIDEO_URL, 'selector': { 'type': 'FragmentSelector', 'conformsTo': 'http://www.w3.org/TR/media-frags/', 'value': 't=35,55' } },
                        'body': { 'type': 'TextualBody', 'frametrail:type': 'text', 'format': 'text/html', 'value': '<p>The three antagonist squirrels appear and begin tormenting the butterfly.</p>', 'frametrail:name': 'Antagonists introduced', 'frametrail:thumb': null, 'frametrail:resourceId': null, 'frametrail:attributes': { 'text': '<p>The three antagonist squirrels appear and begin tormenting the butterfly.</p>' } },
                        'frametrail:tags': []
                    },
                    {
                        '@context': [ 'http://www.w3.org/ns/anno.jsonld', { 'frametrail': 'http://frametrail.org/ns/' } ],
                        'type': 'Annotation', 'frametrail:type': 'Annotation',
                        'creator': { 'nickname': 'Demo', 'type': 'Person', 'id': 'demo' },
                        'created': '2024-01-01T00:02:00Z',
                        'target': { 'type': 'Video', 'source': VIDEO_URL, 'selector': { 'type': 'FragmentSelector', 'conformsTo': 'http://www.w3.org/TR/media-frags/', 'value': 't=65,90' } },
                        'body': { 'type': 'TextualBody', 'frametrail:type': 'text', 'format': 'text/html', 'value': '<p>Big Buck Bunny discovers the mischief and begins planning his elaborate revenge.</p>', 'frametrail:name': "Bunny's revenge plan", 'frametrail:thumb': null, 'frametrail:resourceId': null, 'frametrail:attributes': { 'text': '<p>Big Buck Bunny discovers the mischief and begins planning his elaborate revenge.</p>' } },
                        'frametrail:tags': []
                    }
                ]
            }]
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
