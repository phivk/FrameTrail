<!DOCTYPE html>
<!--
  EXAMPLE: Inline overview (gallery) — multiple hypervideos, no server
  ────────────────────────────────────────────────────────────────────
  Requirements: None. Works in any modern browser, opened from the filesystem
  (file://) or served from any static web server.

  Demonstrates:
  - Passing multiple hypervideos as inline data via `contents`
  - Starting in overview (gallery) mode by omitting startID
  - No _data directory, no PHP server — all data lives in this file
  - storageMode is 'download': edits are stored in memory, export via Save As
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Inline Overview</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <script>
    document.addEventListener('DOMContentLoaded', function() {

        window.ftInstance = FrameTrail.init({
            target: 'body',
            // startID omitted → show overview/gallery on launch

            contents: [
                {
                    hypervideo: {
                        meta: {
                            name:        'Big Buck Bunny',
                            description: 'Open-source animated short by Blender Foundation',
                            thumb:       '',
                            creator:     'Demo',
                            creatorId:   'demo',
                            created:     1700000000000,
                            lastchanged: 1700000000000
                        },
                        config: {
                            layoutArea:  { areaTop: [], areaBottom: [], areaLeft: [], areaRight: [] },
                            hidden:      false,
                            slidingMode: 'overlay'
                        },
                        clips: [{
                            src:      'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
                            duration: 596,
                            start:    0,
                            end:      596
                        }],
                        contents:     [],
                        subtitles:    {},
                        globalEvents: { onReady: '', onPlay: '', onPause: '', onEnded: '' },
                        customCSS:    ''
                    },
                    annotations: [
                        {
                            '@context': [ 'http://www.w3.org/ns/anno.jsonld', { 'frametrail': 'http://frametrail.org/ns/' } ],
                            'type': 'Annotation', 'frametrail:type': 'Annotation',
                            'creator': { 'nickname': 'Demo', 'type': 'Person', 'id': 'demo' },
                            'created': '2024-01-01T00:00:00Z',
                            'target': { 'type': 'Video', 'source': 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4', 'selector': { 'type': 'FragmentSelector', 'conformsTo': 'http://www.w3.org/TR/media-frags/', 'value': 't=10,25' } },
                            'body': { 'type': 'TextualBody', 'frametrail:type': 'text', 'format': 'text/html', 'value': '<p>The opening scene establishes the pastoral landscape.</p>', 'frametrail:name': 'Opening scene', 'frametrail:thumb': null, 'frametrail:resourceId': null, 'frametrail:attributes': { 'text': '<p>The opening scene establishes the pastoral landscape.</p>' } },
                            'frametrail:tags': []
                        },
                        {
                            '@context': [ 'http://www.w3.org/ns/anno.jsonld', { 'frametrail': 'http://frametrail.org/ns/' } ],
                            'type': 'Annotation', 'frametrail:type': 'Annotation',
                            'creator': { 'nickname': 'Demo', 'type': 'Person', 'id': 'demo' },
                            'created': '2024-01-01T00:01:00Z',
                            'target': { 'type': 'Video', 'source': 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4', 'selector': { 'type': 'FragmentSelector', 'conformsTo': 'http://www.w3.org/TR/media-frags/', 'value': 't=35,55' } },
                            'body': { 'type': 'TextualBody', 'frametrail:type': 'text', 'format': 'text/html', 'value': '<p>The squirrels appear and begin their mischief.</p>', 'frametrail:name': 'Antagonists introduced', 'frametrail:thumb': null, 'frametrail:resourceId': null, 'frametrail:attributes': { 'text': '<p>The squirrels appear and begin their mischief.</p>' } },
                            'frametrail:tags': []
                        }
                    ]
                },
                {
                    hypervideo: {
                        meta: {
                            name:        'Elephants Dream',
                            description: 'First open Blender movie — a surreal animated journey',
                            thumb:       '',
                            creator:     'Demo',
                            creatorId:   'demo',
                            created:     1700000001000,
                            lastchanged: 1700000001000
                        },
                        config: {
                            layoutArea:  { areaTop: [], areaBottom: [], areaLeft: [], areaRight: [] },
                            hidden:      false,
                            slidingMode: 'overlay'
                        },
                        clips: [{
                            src:      'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',
                            duration: 654,
                            start:    0,
                            end:      654
                        }],
                        contents:     [],
                        subtitles:    {},
                        globalEvents: { onReady: '', onPlay: '', onPause: '', onEnded: '' },
                        customCSS:    ''
                    },
                    annotations: []
                },
                {
                    hypervideo: {
                        meta: {
                            name:        'For Bigger Blazes',
                            description: 'Google Chrome demo reel — extreme sports and adventure',
                            thumb:       '',
                            creator:     'Demo',
                            creatorId:   'demo',
                            created:     1700000002000,
                            lastchanged: 1700000002000
                        },
                        config: {
                            layoutArea:  { areaTop: [], areaBottom: [], areaLeft: [], areaRight: [] },
                            hidden:      false,
                            slidingMode: 'overlay'
                        },
                        clips: [{
                            src:      'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
                            duration: 15,
                            start:    0,
                            end:      15
                        }],
                        contents:     [],
                        subtitles:    {},
                        globalEvents: { onReady: '', onPlay: '', onPause: '', onEnded: '' },
                        customCSS:    ''
                    },
                    annotations: []
                }
            ]
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
