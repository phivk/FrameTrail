<!DOCTYPE html>
<!--
  EXAMPLE: Embed FrameTrail in a page (server mode)
  ─────────────────────────────────────────────────
  Requirements: Apache + PHP (FrameTrail installed and set up at the parent directory).

  Demonstrates:
  - Mounting the player in a specific <div> instead of <body>
  - Opening a specific hypervideo directly (skipping the overview)
  - Overriding one config value inline while loading everything else from the server

  The `dataPath` and `server` init options tell FrameTrail where _data/ and
  _server/ live relative to this page, so it can live in examples/ without
  needing to copy any server files.

  To run: serve the parent directory with Apache+PHP, open this file in a browser,
  and replace 'your-hypervideo-id' with a real ID from your _data/hypervideos/ folder.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>FrameTrail – Embed in Page</title>
    <link rel="shortcut icon" href="../favico.png">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css"> -->
    <link rel="stylesheet" href="../build/frametrail.min.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; }
        #player-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="player-container"></div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        window.ftInstance = FrameTrail.init({
            target:  '#player-container',
            startID: 'your-hypervideo-id',

            // Override a single config value; all other config comes from _data/config.json.
            // Set config: null (or omit it) to use the server config entirely.
            config: { theme: 'bright' },

            dataPath: '../_data/',
            server:   '../_server/'
        }, 'PlayerLauncher');
    });
    </script>
</body>
</html>
