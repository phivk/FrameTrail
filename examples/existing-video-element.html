<!DOCTYPE html>
<!--
  EXAMPLE: Existing video element — Scenario A
  ─────────────────────────────────────────────
  Requirements: None. Works in any modern browser without a server.
  (Annotations file must be reachable — use a local server if loading from disk.)

  Demonstrates:
  - Passing a reference to an existing <video> element via the `videoElement` option
  - No `target` div needed — FrameTrail inserts a wrapper automatically before the video
  - Annotations loaded from a URL via `annotations` option
  - Overview mode is skipped automatically (single-video mode)

  The <video> keeps its original position in the document; FrameTrail wraps and
  adopts it, removing browser-native controls and rendering its own player UI.

  Replace VIDEO_URL and ANNOTATIONS_URL with real values.
-->
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>FrameTrail – Existing Video Element</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css" /> -->
    <link rel="stylesheet" href="../build/frametrail.min.css" />
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body      { margin: 0; background: #111; }
        #my-video { width: 900px; height: 600px; display: block; }
    </style>
</head>
<body>

    <!--
      This is the existing <video> element already present in the page.
      FrameTrail will wrap and adopt it — no manual container div required.
      Do NOT include the `controls` attribute; FrameTrail renders its own.
    -->
    <video id="my-video"
           src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
           playsinline="">
    </video>

    <script>
    document.addEventListener('DOMContentLoaded', function() {

        var ANNOTATIONS_URL = '';  // URL to a W3C annotations JSON file, or '' for none

        window.ftInstance = FrameTrail.init({

            // Point at the existing video element — no `target` needed.
            // FrameTrail creates a wrapper div before it and uses that as the target.
            videoElement: '#my-video',

            // Optional: load annotations from a URL or pass an inline array.
            // Can be a single URL string or an array of URLs / inline annotation objects.
            annotations: ANNOTATIONS_URL || [],

            config: {
                theme:            '',
                alwaysForceLogin: false,
                allowCaching:     false
            }

        }, 'PlayerLauncher');

    });
    </script>
</body>
</html>
