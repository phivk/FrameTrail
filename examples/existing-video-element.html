<!DOCTYPE html>
<!--
  EXAMPLE: Existing video element — shorthand Scenario A
  ───────────────────────────────────────────────────────
  Requirements: None. Works in any modern browser without a server.

  Demonstrates:
  - Passing a reference to an existing <video> element via `videoElement`
  - No `target` div needed — FrameTrail inserts a wrapper automatically before the video
  - The <video> keeps its original position in the document

  The browser adopts the video, removes its native controls, and renders the FrameTrail UI.

  Replace the src and ANNOTATIONS_URL with real values.
-->
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>FrameTrail – Existing Video Element</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.css" /> -->
    <link rel="stylesheet" href="../build/frametrail.min.css" />
    <!-- <script src="https://cdn.jsdelivr.net/npm/@frametrail/frametrail/frametrail.min.js"></script> -->
    <script src="../build/frametrail.min.js"></script>
    <style>
        body      { margin: 0; background: #111; }
        #my-video { width: 900px; height: 600px; display: block; }
    </style>
</head>
<body>

    <!--
      Existing <video> element already in the page.
      Do NOT include the `controls` attribute; FrameTrail renders its own.
    -->
    <video id="my-video"
           src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
           playsinline="">
    </video>

    <script>
    document.addEventListener('DOMContentLoaded', function() {

        window.ftInstance = FrameTrail.init({

            // Point at the existing video element — no `target` div needed.
            videoElement: '#my-video',

            // Optional: annotations from a URL string, array of URLs, or inline W3C objects.
            annotations: [] // e.g. 'annotations.json' or [{...}, ...]

        }, 'PlayerLauncher');

    });
    </script>
</body>
</html>
